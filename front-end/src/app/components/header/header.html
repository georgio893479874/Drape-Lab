<header class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6">
    <div class="flex items-center gap-3">
      <button
        *ngIf="showMenuButton"
        (click)="menuClick.emit()"
        class="lg:hidden rounded-lg p-2 hover:bg-slate-100"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"
          />
        </svg>
      </button>
      <a href="/" class="text-lg sm:text-2xl font-semibold tracking-[0.25em] text-slate-950">
        Drape Lab
      </a>
    </div>
    <nav class="hidden lg:flex items-center gap-8 text-sm font-medium text-slate-700">
      <a href="/">Home</a>
      <a href="/">Deals</a>
      <a href="/">New Arrivals</a>
      <a href="/">Packages</a>
    </nav>
    <div class="flex items-center gap-2">
      <div class="hidden sm:flex items-center gap-3">
        <a href="/signin" class="text-sm font-medium text-slate-700"> Sign In </a>
        <a
          href="/signup"
          class="rounded-full bg-slate-950 px-5 py-2 text-sm font-semibold text-white"
        >
          Sign Up
        </a>
      </div>
      <div class="flex sm:hidden items-center gap-2">
        <a href="/signin" class="rounded-full p-2 hover:bg-slate-100">
          <ng-icon name="heroArrowLeftOnRectangle" size="20px"></ng-icon>
        </a>
        <a href="/signup" class="rounded-full p-2 bg-slate-950 text-white size-10 flex justify-center items-center">
          <ng-icon name="heroUserPlus" size="20px"></ng-icon>
        </a>
      </div>
    </div>
  </div>
</header>
