<header
  class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-slate-200">

  <div
    class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6">

    <!-- Left -->
    <div class="flex items-center gap-3">

      <button
        *ngIf="showMenuButton"
        (click)="menuClick.emit()"
        class="lg:hidden rounded-lg p-2 hover:bg-slate-100">

        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor">

          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16" />
        </svg>

      </button>

      <a
        href="/"
        class="text-lg sm:text-2xl font-semibold tracking-[0.25em] text-slate-950">

        Drape Lab

      </a>

    </div>

    <!-- Desktop nav -->
    <nav
      class="hidden lg:flex items-center gap-8 text-sm font-medium text-slate-700">

      <a href="/">Home</a>
      <a href="/">Deals</a>
      <a href="/">New Arrivals</a>
      <a href="/">Packages</a>

    </nav>

    <!-- Right -->
    <div class="flex items-center gap-2">

      <!-- Desktop -->
      <div class="hidden sm:flex items-center gap-3">

        <a
          href="/signin"
          class="text-sm font-medium text-slate-700">

          Sign In

        </a>

        <a
          href="/signup"
          class="rounded-full bg-slate-950 px-5 py-2 text-sm font-semibold text-white">

          Sign Up

        </a>

      </div>

      <!-- Mobile -->
      <div class="flex sm:hidden items-center gap-2">

        <a
          href="/signin"
          class="rounded-full p-2 hover:bg-slate-100">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5.121 17.804A9 9 0 1118.88 17.804M15 11a3 3 0 11-6 0 3 3 0 016 0z" />

          </svg>

        </a>

        <a
          href="/signup"
          class="rounded-full p-2 bg-slate-950 text-white">

          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor">

            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M18 9v6M15 12h6M5 20h7a4 4 0 004-4v-1a4 4 0 00-4-4H9a4 4 0 00-4 4v5z" />

          </svg>

        </a>

      </div>

    </div>

  </div>

</header>
