<footer class="bg-slate-950 text-slate-200">
  <div class="mx-auto max-w-7xl space-y-8 px-6 py-12 sm:px-8">
    <div class="flex flex-col gap-5 rounded-[2rem] border border-slate-800 bg-slate-900/90 p-6 sm:flex-row sm:items-center sm:justify-between">
      <div class="space-y-2">
        <p class="text-xs uppercase tracking-[0.35em] text-slate-500">Stay in the loop</p>
        <h3 class="text-2xl font-semibold text-white">Subscribe for launch news</h3>
      </div>
      <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
        <input type="text" [(ngModel)]="username" placeholder="Email address" class="min-w-[250px] rounded-full border border-slate-700 bg-slate-900/90 px-4 py-3 text-sm text-white outline-none ring-white/10 transition focus:border-white focus:ring-2" />
        <button (click)="onSubscribe()" class="rounded-full bg-white px-6 py-3 text-sm font-semibold text-slate-950 transition hover:bg-slate-100">Subscribe</button>
      </div>
    </div>

    <div class="flex flex-col gap-4 border-t border-slate-800 pt-6 sm:flex-row sm:items-center sm:justify-between">
      <p class="text-sm text-slate-500">© 2026 Drape Lab. Crafted with style.</p>
      <div class="flex flex-wrap items-center gap-4 text-xs uppercase tracking-[0.35em] text-slate-500">
      </div>
    </div>
  </div>
</footer>
