    <div
      *ngIf="showLightbox"
      class="fixed inset-0 z-50 flex items-center justify-center bg-black/90"
      (click)="closeLightbox()"
    >
      <button class="absolute right-8 top-8 rounded-full bg-white px-4 py-2 font-bold">✕</button>

      <img
        [src]="lightboxImage"
        (click)="$event.stopPropagation()"
        class="max-h-[90vh] max-w-[90vw] rounded-3xl"
      />
    </div>
